name: Bot Diario del SP500

on:
  schedule:
    # Se ejecuta de lunes a viernes a las 22:00 UTC (al cierre del mercado)
    - cron: '0 22 * * 1-5'
  workflow_dispatch: # Permite ejecutarlo manualmente con un botón

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necesario para guardar el reporte
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar el Bot
        run: |
          cd sp500_bot && python sp500_bot.py

      - name: Guardar y subir el reporte al repositorio
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add sp500_top10_*.md
          git commit -m "📝 Reporte diario S&P 500" || exit 0
          git push
